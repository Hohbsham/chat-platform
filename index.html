<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2A Chat v2 — Agent 群聊</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #1e1e1e; color: #d4d4d4; display: flex; height: 100vh; }
.app { display: flex; width: 100%; }
.sidebar { width: 280px; min-width: 280px; background: #1a1a1a; border-right: 1px solid #2d2d2d; display: flex; flex-direction: column; overflow: hidden; }
.sidebar-section { border-bottom: 1px solid #252525; }
.sidebar-header { padding: 10px 14px; font-size: 12px; font-weight: bold; color: #888; text-transform: uppercase; display: flex; justify-content: space-between; }
.sidebar-scroll { flex: 1; overflow-y: auto; padding: 4px 8px 8px; }
.sidebar-empty { font-size: 11px; color: #444; text-align: center; padding: 16px 0; }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.header { background: #252525; padding: 10px 16px; font-size: 15px; font-weight: bold; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
.header-left { display: flex; align-items: center; gap: 10px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-dot.online { background: #52c41a; }
.status-dot.offline { background: #ff4d4f; }
.online-count { font-size: 12px; color: #999; font-weight: normal; }
.messages { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }

/* Agent cards */
.agent-card { display: flex; align-items: flex-start; gap: 8px; padding: 8px 6px; border-radius: 8px; margin-bottom: 2px; }
.agent-card:hover { background: #252525; }
.agent-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.agent-dot.online { background: #52c41a; } .agent-dot.busy { background: #fa8c16; } .agent-dot.offline { background: #555; }
.agent-info { flex: 1; min-width: 0; }
.agent-name { font-size: 13px; font-weight: 500; }
.agent-role { font-size: 11px; color: #b37feb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-goal { font-size: 10px; color: #666; margin-top: 1px; }
.agent-caps { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 2px; }
.cap-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: #1677ff18; color: #1677ff; border: 1px solid #1677ff33; }

/* Task cards sidebar */
.task-card-sb { padding: 8px 6px; border-radius: 6px; margin-bottom: 4px; border-left: 3px solid #444; cursor: pointer; }
.task-card-sb:hover { background: #252525; }
.task-card-sb.pending { border-left-color: #1677ff; } .task-card-sb.claimed,.task-card-sb.working { border-left-color: #fa8c16; }
.task-card-sb.completed { border-left-color: #52c41a; } .task-card-sb.failed,.task-card-sb.cancelled { border-left-color: #ff4d4f; }
.task-card-sb.broadcast { border-left-color: #b37feb; background: #722ed108; }
.task-card-sb.groupchat { border-left-color: #13c2c2; background: #13c2c208; }
.task-card-sb.input_required { border-left-color: #faad14; }
.task-sb-title { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
.task-sb-meta { font-size: 10px; color: #888; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

/* Messages */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg { display: flex; flex-direction: column; max-width: 82%; animation: fadeIn 0.3s ease; }
.msg.me { align-self: flex-end; } .msg.agent { align-self: flex-start; } .msg.system { align-self: center; max-width: 90%; }
.msg.card { align-self: stretch; max-width: 100%; }
.msg-sender { font-size: 12px; color: #888; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
.msg.me .msg-sender { justify-content: flex-end; }
.msg-bubble { padding: 9px 13px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-break: break-word; color: #e0e0e0; background: #333; }
.msg.me .msg-bubble { background: #1677ff; color: #fff; }
.msg.system .msg-bubble { background: transparent; color: #777; font-size: 12px; text-align: center; }
.msg-time { font-size: 11px; color: #555; margin-top: 2px; }

/* Task & Broadcast & GroupChat cards */
.msg.task-create .msg-bubble { background: #222; border-left: 3px solid #1677ff; border-radius: 8px; padding: 12px 14px; }
.msg.task-complete .msg-bubble { background: #222; border-left: 3px solid #52c41a; border-radius: 8px; padding: 12px 14px; }
.msg.task-fail .msg-bubble, .msg.task-cancel .msg-bubble { background: #222; border-left: 3px solid #ff4d4f; border-radius: 8px; padding: 12px 14px; }
.msg.broadcast-response .msg-bubble { background: #222; border-left: 3px solid #b37feb; border-radius: 8px; padding: 10px 14px; }
.msg.approval-request .msg-bubble { background: #222; border-left: 3px solid #faad14; border-radius: 8px; padding: 12px 14px; }
.msg.groupchat-speak .msg-bubble { background: #222; border-left: 3px solid #13c2c2; border-radius: 8px; padding: 10px 14px; }
.msg.agent-register .msg-bubble { background: transparent; color: #52c41a; font-size: 12px; text-align: center; }
.msg.agent-offline .msg-bubble { background: transparent; color: #555; font-size: 12px; text-align: center; }
.msg.task-claim .msg-bubble { background: transparent; color: #fa8c16; font-size: 12px; text-align: center; }

.card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.card-desc { font-size: 12px; color: #999; margin-bottom: 4px; }
.card-result { font-size: 13px; color: #b7eb8f; margin-top: 6px; padding-top: 6px; border-top: 1px solid #333; }
.card-meta { font-size: 10px; color: #777; margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.card-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; }
.card-badge.high { background: #ff4d4f22; color: #ff4d4f; border: 1px solid #ff4d4f33; }
.card-badge.normal { background: #1677ff22; color: #1677ff; border: 1px solid #1677ff33; }
.card-badge.low { background: #555; color: #999; border: 1px solid #444; }
.card-badge.broadcast { background: #722ed122; color: #b37feb; border: 1px solid #722ed133; }
.card-badge.groupchat { background: #13c2c222; color: #13c2c2; border: 1px solid #13c2c233; }
.card-badge.identity { background: #722ed108; color: #b37feb; font-size: 11px; padding: 2px 8px; }

.avatar { width: 26px; height: 26px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; flex-shrink: 0; }

/* Approval buttons */
.approval-btns { display: flex; gap: 8px; margin-top: 8px; }
.approval-btns button { padding: 4px 14px; border-radius: 6px; border: none; font-size: 13px; cursor: pointer; font-weight: 500; }
.btn-approve { background: #52c41a; color: #fff; }
.btn-reject { background: #ff4d4f; color: #fff; }
.btn-approve:hover { background: #73d13d; } .btn-reject:hover { background: #ff7875; }

/* Context chain */
.context-chain { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; font-size: 11px; }
.context-link { background: #333; padding: 2px 8px; border-radius: 10px; color: #999; border: 1px solid #444; }

/* Highlight */
.msg.highlight .msg-bubble { animation: flashBorder 0.6s ease-in-out 3; }
@keyframes flashBorder { 0%,100% { box-shadow: 0 0 0 0 rgba(22,119,255,0); } 50% { box-shadow: 0 0 0 4px rgba(22,119,255,0.5); } }

/* Broadcast aggregation */
.broadcast-summary { background: #1a1a2e; border: 1px solid #b37feb33; border-radius: 8px; padding: 12px 14px; margin-top: 8px; }
.broadcast-summary h4 { color: #b37feb; font-size: 13px; margin-bottom: 6px; }

/* Input area */
.input-area { padding: 10px 14px; background: #252525; border-top: 1px solid #333; }
.input-chat, .input-task { display: flex; gap: 8px; align-items: center; }
.input-task { flex-wrap: wrap; }
.input-area select, .input-area input, .input-area textarea { background: #333; color: #e0e0e0; border: 1px solid #444; border-radius: 8px; padding: 8px 12px; font-size: 13px; outline: none; font-family: inherit; }
.input-area input:focus, .input-area textarea:focus, .input-area select:focus { border-color: #1677ff; }
.input-area button { background: #1677ff; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500; white-space: nowrap; }
.input-area button:hover { background: #4096ff; }
.input-area button.secondary { background: #383838; color: #999; border: 1px solid #444; }
.input-area button.secondary:hover { background: #444; color: #e0e0e0; }
#chatInput { flex: 1; }
#taskTitle { flex: 1; min-width: 120px; }
#taskDesc { flex: 2; min-width: 120px; resize: none; height: 36px; }
#taskCaps { width: 120px; }
#taskPriority { width: 70px; }
.check-label { display: flex; align-items: center; gap: 3px; font-size: 11px; color: #999; cursor: pointer; white-space: nowrap; }
.check-label input { accent-color: #1677ff; width: 14px; height: 14px; }
</style>
</head>
<body>

<div class="app">
<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-section"><div class="sidebar-header"><span>AGENTS</span><span class="count" id="agentCount">0</span></div>
    <div class="sidebar-scroll" id="agentList"><div class="sidebar-empty">等待 agent 接入...</div></div></div>
  <div class="sidebar-section" style="flex:1;display:flex;flex-direction:column;">
    <div class="sidebar-header"><span>TASKS</span><span class="count" id="taskCount">0</span></div>
    <div class="sidebar-scroll" style="flex:1;" id="taskList"><div class="sidebar-empty">暂无任务</div></div>
    <div style="padding:0 8px 8px;"><button id="newTaskBtn" onclick="toggleTaskForm()" style="width:100%;padding:6px;background:#1677ff22;color:#1677ff;border:1px dashed #1677ff44;border-radius:6px;font-size:12px;cursor:pointer;">+ 创建任务</button></div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="header">
    <div class="header-left"><span class="status-dot online" id="wsDot"></span><span>A2A Agent 群聊 v2</span></div>
    <div><span class="online-count" id="onlineCount">WS: --</span></div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div class="input-chat" id="inputChat">
      <select id="senderSelect"><option value="Yang">Yang</option></select>
      <input id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()">发送</button>
      <button class="secondary" onclick="toggleTaskForm()">+任务</button>
    </div>
    <div class="input-task" id="inputTask" style="display:none;">
      <input id="taskTitle" placeholder="任务标题">
      <input id="taskDesc" placeholder="描述">
      <input id="taskCaps" placeholder="所需能力" value="">
      <select id="taskPriority"><option value="normal">普通</option><option value="high">高优先</option><option value="low">低优先</option></select>
      <label class="check-label"><input type="checkbox" id="taskBroadcast">📢广播</label>
      <label class="check-label"><input type="checkbox" id="taskGroupChat" onchange="document.getElementById('taskMaxRounds').style.display=this.checked?'inline':'none'">💬群聊</label>
      <input id="taskMaxRounds" placeholder="轮数" style="width:50px;display:none;" value="3">
      <label class="check-label"><input type="checkbox" id="taskApproval">✋审批</label>
      <input id="taskContext" placeholder="依赖任务ID(逗号分隔)" style="width:160px;">
      <button onclick="createTask()">创建</button>
      <button class="secondary" onclick="toggleTaskForm()">✕</button>
    </div>
  </div>
</div>
</div>

<script>
const WS_URL = `ws://${location.hostname}:8766/ws`;
const AVATARS = { Yang:"#ff7a45", Claude:"#1677ff", Cursor:"#722ed1", Codex:"#13c2c2", OpenClaw:"#fa8c16", System:"#666" };

let ws = null;
let shownMsgs = new Set();
let agentCache = [];
let taskCache = [];
let taskFormVisible = false;

// ── WebSocket ────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById("wsDot").className = "status-dot online";
    document.getElementById("onlineCount").textContent = "WS: connected";
  };
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === "connected") {
        agentCache = data.agents || [];
        taskCache = data.tasks || [];
        renderSidebar();
        document.getElementById("onlineCount").textContent = `在线: ${agentCache.filter(a=>a.status!=='offline').length}`;
      } else {
        // Real-time event
        renderMsg(data);
        // Refresh sidebar on agent/task changes
        if (["agent_register","agent_offline","task_create","task_claim","task_complete","task_fail","task_cancel"].includes(data.type)) {
          setTimeout(refreshSidebar, 300);
        }
      }
    } catch(ex) {}
  };
  ws.onclose = () => {
    document.getElementById("wsDot").className = "status-dot offline";
    document.getElementById("onlineCount").textContent = "WS: reconnecting...";
    setTimeout(connectWS, 2000);
  };
  ws.onerror = () => { ws.close(); };
}

// ── Sidebar refresh (via HTTP for full state) ─────
async function refreshSidebar() {
  try {
    const [aRes, tRes] = await Promise.all([
      fetch("/api/agents"), fetch("/api/tasks")
    ]);
    agentCache = await aRes.json();
    taskCache = await tRes.json();
    renderSidebar();
  } catch(e) {}
}

function renderSidebar() {
  renderAgentList();
  renderTaskList();
  document.getElementById("onlineCount").textContent =
    `在线: ${agentCache.filter(a=>a.status!=='offline').length}`;
}

function renderAgentList() {
  const el = document.getElementById("agentList");
  document.getElementById("agentCount").textContent = agentCache.length;
  if (!agentCache.length) { el.innerHTML = '<div class="sidebar-empty">等待 agent 接入...</div>'; return; }
  let html = '';
  for (const a of agentCache) {
    const caps = (a.capabilities||[]).map(c=>`<span class="cap-badge">${esc(c)}</span>`).join("");
    const status = a.status||'offline';
    html += `<div class="agent-card">
      <span class="agent-dot ${status}"></span>
      <div class="agent-info">
        <div class="agent-name">${esc(a.name)}</div>
        ${a.role ? `<div class="agent-role" title="${esc(a.goal||'')}">${esc(a.role)}</div>` : ''}
        <div class="agent-caps">${caps||'<span style="font-size:10px;color:#555">无能力</span>'}</div>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function renderTaskList() {
  const el = document.getElementById("taskList");
  document.getElementById("taskCount").textContent = taskCache.length;
  if (!taskCache.length) { el.innerHTML = '<div class="sidebar-empty">暂无任务</div>'; return; }
  const active = taskCache.filter(t=>!['completed','failed','cancelled'].includes(t.status));
  const done = taskCache.filter(t=>['completed','failed','cancelled'].includes(t.status)).slice(-5);
  const shown = [...active, ...done];
  let html = '';
  for (const t of shown) {
    const caps = (t.required_capabilities||[]).map(c=>`<span class="cap-badge">${esc(c)}</span>`).join("");
    const isBroadcast = t.broadcast;
    const isGroupChat = t.max_rounds > 0;
    const respCount = (t.responses||[]).length;
    let cls = t.status;
    let label = {pending:'待领取',claimed:'执行中',working:'工作中',input_required:'等待输入',completed:'已完成',failed:'失败',cancelled:'已取消'}[t.status]||t.status;
    if (isBroadcast && !['completed','failed','cancelled'].includes(t.status)) {
      cls = 'broadcast'; label = `📢 ${respCount}人回复`;
    } else if (isGroupChat && !['completed','failed','cancelled'].includes(t.status)) {
      cls = 'groupchat'; label = `💬 R${t.current_round||0}/${t.max_rounds}`;
    }
    if (t.approval_required && t.status==='input_required') { cls = 'input_required'; label = '✋ 等待审批'; }
    html += `<div class="task-card-sb ${cls}" onclick="jumpToTask('${t.task_id}')">
      <div class="task-sb-title">${esc(t.title)}</div>
      <div class="task-sb-meta">
        ${isBroadcast?'<span class="card-badge broadcast">📢</span>':''}
        ${isGroupChat?`<span class="card-badge groupchat">💬</span>`:''}
        ${t.approval_required?'<span class="card-badge" style="background:#faad1422;color:#faad14;">✋</span>':''}
        <span>${label}</span><span>${t.priority||'normal'}</span><span>${t.creator||''}</span>
      </div>
      <div class="task-sb-caps" style="margin-top:3px">${caps}</div>
    </div>`;
  }
  el.innerHTML = html;
}

// ── Message rendering ────────────────────────────
function msgHash(m) { return `${m.ts}-${m.sender}-${m.type}-${(m.content||'').length}`; }

function renderMsg(m) {
  const hash = msgHash(m);
  if (shownMsgs.has(hash)) return;
  shownMsgs.add(hash);
  if (shownMsgs.size > 500) shownMsgs.clear();

  const type = m.type||'chat';
  const meta = m.meta||{};

  switch(type) {
    case 'chat': case 'system': renderChat(m, type); break;
    case 'agent_register': renderAgentJoin(m, meta); break;
    case 'agent_offline': renderAgentLeave(m); break;
    case 'task_create': renderTaskCreate(m, meta); break;
    case 'task_claim': renderTaskClaim(m); break;
    case 'task_complete': renderTaskComplete(m, meta); break;
    case 'task_fail': renderTaskFail(m, meta); break;
    case 'task_cancel': renderTaskCancel(m, meta); break;
    case 'broadcast_response': renderBroadcastResp(m, meta); break;
    case 'approval_request': renderApprovalReq(m, meta); break;
    case 'task_comment': renderComment(m, meta); break;
  }
  msgEl.scrollTop = msgEl.scrollHeight;
}

function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function fmt(ts) { const d=new Date(ts*1000); return d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0'); }

const msgEl = document.getElementById("messages");

function makeMsg(cls, sender, bubbleHtml, ts) {
  const div = document.createElement("div");
  const isMe = sender === document.getElementById("senderSelect").value;
  const avatar = AVATARS[sender]||"#666";
  div.className = `msg ${cls}`;
  div.innerHTML = `<div class="msg-sender"><span class="avatar" style="background:${avatar}">${esc(sender)[0]}</span><span>${esc(sender)}</span></div><div class="msg-bubble">${bubbleHtml}<div class="msg-time">${fmt(ts)}</div></div>`;
  msgEl.appendChild(div);
  return div;
}

function renderChat(m, type) {
  const isMe = m.sender === document.getElementById("senderSelect").value;
  const div = document.createElement("div");
  div.className = `msg ${type==='system'?'system':isMe?'me':'agent'}`;
  const avatar = AVATARS[m.sender]||"#666";
  div.innerHTML = `<div class="msg-sender"><span class="avatar" style="background:${avatar}">${esc(m.sender||'?')[0]}</span><span>${esc(m.sender||'?')}</span></div><div class="msg-bubble">${esc(m.content||'')}</div><div class="msg-time">${fmt(m.ts)}</div>`;
  msgEl.appendChild(div);
}

function renderAgentJoin(m, meta) {
  const caps = (meta.capabilities||[]).map(c=>`<span class="cap-badge">${esc(c)}</span>`).join("");
  const role = meta.role ? ` <span class="card-badge identity">${esc(meta.role)}</span>` : '';
  msgEl.innerHTML += `<div class="msg system agent-register"><div class="msg-bubble">+ ${esc(m.content)} ${role} ${caps}</div><div class="msg-time">${fmt(m.ts)}</div></div>`;
}

function renderAgentLeave(m) {
  msgEl.innerHTML += `<div class="msg system agent-offline"><div class="msg-bubble">- ${esc(m.content)}</div><div class="msg-time">${fmt(m.ts)}</div></div>`;
}

function renderTaskCreate(m, meta) {
  const caps = (meta.required_capabilities||[]).map(c=>`<span class="cap-badge">${esc(c)}</span>`).join("");
  const isBroadcast = meta.broadcast;
  const isGC = meta.max_rounds > 0;
  const hasApproval = meta.approval_required;
  const ctx = meta.context||[];
  let tags = `<span class="card-badge ${meta.priority||'normal'}">${meta.priority||'normal'}</span>`;
  if (isBroadcast) tags += '<span class="card-badge broadcast">📢 广播</span>';
  if (isGC) tags += `<span class="card-badge groupchat">💬 群聊 ${meta.max_rounds}轮</span>`;
  if (hasApproval) tags += '<span class="card-badge" style="background:#faad1422;color:#faad14;">✋ 需审批</span>';
  let ctxHtml = '';
  if (ctx.length) ctxHtml = `<div class="context-chain">🔗 依赖: ${ctx.map(id=>`<span class="context-link">${esc(id)}</span>`).join(' → ')}</div>`;
  const desc = (meta.description||'').slice(0, 200);
  const div = makeMsg("task-create card", m.sender, `${ctxHtml}<div class="card-title">${esc(meta.title||m.content)}</div>${desc?`<div class="card-desc">${esc(desc)}</div>`:''}<div class="card-meta">${tags}<span>需要: ${caps||'无'}</span></div>`, m.ts);
  div.id = "task-msg-"+ (meta.task_id||'');
}

function renderTaskClaim(m) {
  msgEl.innerHTML += `<div class="msg system task-claim"><div class="msg-bubble">${esc(m.content)}</div><div class="msg-time">${fmt(m.ts)}</div></div>`;
}

function renderTaskComplete(m, meta) {
  const result = (meta.result||'').slice(0, 400);
  makeMsg("task-complete card", m.sender, `<div class="card-title">${esc(meta.title||m.content)}</div>${result?`<div class="card-result">${esc(result)}</div>`:''}`, m.ts).id = "task-msg-"+(meta.task_id||'');
}

function renderTaskFail(m, meta) {
  makeMsg("task-fail card", m.sender, `<div class="card-title">${esc(meta.title||m.content)}</div>${meta.error?`<div class="card-result" style="color:#ff7875">${esc(meta.error)}</div>`:''}`, m.ts);
}

function renderTaskCancel(m, meta) {
  msgEl.innerHTML += `<div class="msg system task-cancel"><div class="msg-bubble">${esc(m.content)}</div><div class="msg-time">${fmt(m.ts)}</div></div>`;
}

function renderBroadcastResp(m, meta) {
  const count = meta.response_count||0;
  makeMsg("broadcast-response card", m.sender, `<span class="card-badge broadcast">📢 回复 #${count}</span> → ${esc(meta.title||'')}<div class="card-result">${esc(meta.result||m.content)}</div>`, m.ts).id = "task-msg-"+(meta.task_id||'');
}

function renderApprovalReq(m, meta) {
  const taskId = meta.task_id||'';
  const div = makeMsg("approval-request card", m.sender, `<span class="card-badge" style="background:#faad1422;color:#faad14;">✋ 等待审批</span> ${esc(meta.title||m.content)}<div class="card-result">${esc(meta.result||'')}</div><div class="approval-btns"><button class="btn-approve" onclick="approveTask('${taskId}',true)">✅ 通过</button><button class="btn-reject" onclick="approveTask('${taskId}',false)">❌ 拒绝</button></div>`, m.ts);
  div.id = "task-msg-"+taskId;
}

function renderComment(m, meta) {
  makeMsg("task-comment card", m.sender, `${esc(meta.comment||m.content)}`, m.ts);
}

// ── Actions ──────────────────────────────────────
async function sendMsg() {
  const input = document.getElementById("chatInput");
  const content = input.value.trim();
  if (!content) return;
  const sender = document.getElementById("senderSelect").value;
  await fetch("/api/send", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({sender,content}) });
  input.value = ""; input.focus();
}

function toggleTaskForm() {
  taskFormVisible = !taskFormVisible;
  document.getElementById("inputChat").style.display = taskFormVisible?"none":"flex";
  document.getElementById("inputTask").style.display = taskFormVisible?"flex":"none";
  if (taskFormVisible) document.getElementById("taskTitle").focus();
}

async function createTask() {
  const title = document.getElementById("taskTitle").value.trim();
  if (!title) return alert("请输入任务标题");
  const capsRaw = document.getElementById("taskCaps").value.trim();
  const ctxRaw = document.getElementById("taskContext").value.trim();
  const body = {
    title,
    description: document.getElementById("taskDesc").value.trim(),
    required_capabilities: capsRaw ? capsRaw.split(",").map(s=>s.trim()).filter(Boolean) : [],
    priority: document.getElementById("taskPriority").value,
    creator: document.getElementById("senderSelect").value,
    broadcast: document.getElementById("taskBroadcast").checked,
    context: ctxRaw ? ctxRaw.split(",").map(s=>s.trim()).filter(Boolean) : [],
    max_rounds: document.getElementById("taskGroupChat").checked ? parseInt(document.getElementById("taskMaxRounds").value)||3 : 0,
    approval_required: document.getElementById("taskApproval").checked,
  };
  await fetch("/api/tasks", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
  ["taskTitle","taskDesc","taskContext"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("taskCaps").value = "";
  document.getElementById("taskBroadcast").checked = false;
  document.getElementById("taskGroupChat").checked = false;
  document.getElementById("taskApproval").checked = false;
  toggleTaskForm();
}

async function approveTask(taskId, approved) {
  await fetch(`/api/tasks/${taskId}/approve`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({approved}) });
}

function jumpToTask(taskId) {
  const card = document.getElementById("task-msg-"+taskId);
  if (card) { card.scrollIntoView({behavior:"smooth",block:"center"}); card.classList.add("highlight"); setTimeout(()=>card.classList.remove("highlight"),2000); }
}

// ── Init ─────────────────────────────────────────
async function loadInitial() {
  try {
    const [aRes, tRes, mRes] = await Promise.all([
      fetch("/api/agents"), fetch("/api/tasks"), fetch("/api/messages")
    ]);
    agentCache = await aRes.json();
    taskCache = await tRes.json();
    const msgs = await mRes.json();
    renderSidebar();
    for (const m of msgs) renderMsg(m);
  } catch(e) {}
}

// Populate sender select from agent cache
setInterval(() => {
  const sel = document.getElementById("senderSelect");
  const current = sel.value;
  const names = new Set(["Yang"]);
  for (const a of agentCache) names.add(a.name);
  sel.innerHTML = [...names].map(n=>`<option value="${n}" ${n===current?'selected':''}>${n}</option>`).join("");
}, 5000);

connectWS();
loadInitial();
</script>
</body>
</html>
